services:
  nginx:
    image: nginx:latest
    ports:
      - 80:80
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
  backend:
    build: backend
    ports:
      - 8080:8080
    depends_on:
      ollama:
        condition: service_started
      database:
        condition: service_healthy
      vector_database:
        condition: service_started
    volumes:
      - files-data:/uploads
  ollama:
    build: ollama
    ports:
      - 11434:11434
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=-1
    restart: unless-stopped

  vector_database:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      -
        source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - qdrant-data:/qdrant/storage

  database:
    image: postgres:17
    environment:
      POSTGRES_DB: "projects_database"
      POSTGRES_USER: "projects_service_user"
      POSTGRES_PASSWORD: "gH8i9v"
    volumes:
      - projects-service-data:/var/lib/postgresql/data
    ports:
      - 5433:5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projects_service_user -d projects_database"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

configs:
  qdrant_config:
    content: |
      log_level: INFO

volumes:
  qdrant-data:
  projects-service-data:
  ollama-models:
  files-data: