services:
  ollama:
    build: ollama
    ports:
      - 11434:11434
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=-1
    restart: unless-stopped

  vector_database:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      -
        source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - ./qdrant_data:/qdrant/storage

  database:
    image: postgres:17
    environment:
      POSTGRES_DB: "projects_database"
      POSTGRES_USER: "projects_service_user"
      POSTGRES_PASSWORD: "gH8i9v"
    volumes:
      - projects-service-data:/var/lib/posrgesql/data
    ports:
      - 5433:5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projects_service_user -d projects_database"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

configs:
  qdrant_config:
    content: |
      log_level: INFO

volumes:
  qdrant_data:
  projects-service-data:
  ollama_models: